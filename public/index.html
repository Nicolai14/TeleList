<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeleList</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #player-wrapper {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #empty-state {
      position: absolute;
      text-align: center;
      color: #666;
    }

    #empty-state h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    #empty-state p { font-size: 0.9rem; }

    #sidebar {
      width: 100%;
      height: 220px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    #sidebar-header h3 {
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #controls {
      display: flex;
      gap: 8px;
    }

    button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #f1f1f1;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
    }

    button:hover { background: #3a3a3a; }
    button.danger:hover { background: #5c1a1a; border-color: #8b2222; }

    #queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 16px;
      border-bottom: 1px solid #222;
      transition: background 0.1s;
    }

    .queue-item:hover { background: #222; }

    .queue-item.current {
      background: #1c2a1c;
      border-left: 3px solid #3ecf4c;
    }

    .queue-thumb {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
      background: #333;
    }

    .queue-info { flex: 1; min-width: 0; }

    .queue-title {
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-meta {
      font-size: 0.7rem;
      color: #666;
      margin-top: 2px;
    }

    .queue-pos {
      font-size: 0.75rem;
      color: #555;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    #status-bar {
      padding: 4px 16px;
      font-size: 0.7rem;
      color: #555;
      border-top: 1px solid #222;
    }

    #status-bar span { color: #3ecf4c; }
  </style>
</head>
<body>

<div id="player-wrapper">
  <div id="empty-state">
    <h2>Keine Videos in der Queue</h2>
    <p>Schicke einen YouTube-Link in die Telegram-Gruppe</p>
  </div>
  <div id="player"></div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h3>Queue (<span id="queue-count">0</span>)</h3>
    <div id="controls">
      <button id="btn-skip">⏭ Skip</button>
      <button id="btn-clear" class="danger">🗑 Clear</button>
    </div>
  </div>
  <div id="queue-list"></div>
  <div id="status-bar">Verbinde...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/player.js"></script>
</body>
</html>
